<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="32" fill="url(#bg)"/>
  <!-- Wind waves -->
  <path d="M30 100 Q65 70, 100 100 T170 100 T240 100" stroke="url(#wave)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M30 130 Q65 100, 100 130 T170 130 T240 130" stroke="url(#wave)" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M30 160 Q65 130, 100 160 T170 160 T240 160" stroke="url(#wave)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Wind arrow -->
  <path d="M185 55 L225 80 L185 105" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <line x1="140" y1="80" x2="225" y2="80" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <!-- Text -->
  <text x="128" y="218" text-anchor="middle" fill="white" font-size="30" font-family="system-ui,-apple-system,sans-serif" font-weight="600" letter-spacing="2">WINDY</text>
</svg>
